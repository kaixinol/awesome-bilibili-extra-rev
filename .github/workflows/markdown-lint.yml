name: Markdown Lint
on:
  push:
    branches:
      - main
    paths:
      - 'README_RAW.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint.json'
      - '.github/workflows/markdown-lint.yml'
  pull_request:
    types: [opened, synchronize]
    branches:
      - main
    paths:
      - 'README_RAW.md'
      - 'CONTRIBUTING.md'
      - '.markdownlint.json'
      - '.github/workflows/markdown-lint.yml'
jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            README_RAW.md
            CONTRIBUTING.md
