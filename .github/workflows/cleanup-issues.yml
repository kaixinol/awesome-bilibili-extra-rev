name: Create Cleanup Issue

on:
  workflow_dispatch:
    inputs:
      AUTO_CREATE:
        description: '自动创建 Issue'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  create-issue:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Scan and create cleanup issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
          import { loadAllItems } from './src/data/yaml-manager.js';
          import { checkRepoStatus } from './src/checkers/link-checker.js';

          const main = async () => {
            const allItems = loadAllItems();
            console.log('Loading ' + allItems.length + ' projects...');

            const withStatus = await checkRepoStatus(allItems);

            const archived = [];
            const inactive = [];
            const archivedInactive = [];

            for (const item of withStatus) {
              if (item.__archived && item.__inactive) {
                archivedInactive.push(item);
              } else if (item.__archived) {
                archived.push(item);
              } else if (item.__inactive) {
                inactive.push(item);
              }
            }

            const sortByDate = (a, b) => (a.__updatedAt || '').localeCompare(b.__updatedAt || '');
            archivedInactive.sort(sortByDate);
            archived.sort(sortByDate);
            inactive.sort(sortByDate);

            const total = archivedInactive.length + archived.length + inactive.length;
            if (total === 0) {
              console.log('No projects to clean up.');
              return;
            }

            const yearsAgo = (isoDate) => {
              const diff = Date.now() - new Date(isoDate).getTime();
              return (diff / (365.25 * 24 * 60 * 60 * 1000)).toFixed(1);
            };

            const formatItem = (item, type) => {
              const url = item.__normalizedLink;
              let name, suffix;

              if (item.from === 'github') {
                name = item.link;
                if (type === 'archived') {
                  suffix = '（已存档于 ' + (item.__updatedAt || '').slice(0, 10) + '）';
                } else {
                  suffix = '（最后更新于 ' + yearsAgo(item.__updatedAt) + ' 年前）';
                }
              } else if (item.from === 'greasyfork') {
                const author = item.__gfAuthor || 'Unknown';
                const scriptName = item.__gfName || item.name;
                name = author + '/' + scriptName;
                if (type === 'archived') {
                  suffix = '（已删除）';
                } else {
                  suffix = '（最后更新于 ' + yearsAgo(item.__updatedAt) + ' 年前）';
                }
              } else {
                name = item.name;
                suffix = '';
              }
              return '- [x] [' + name + '](' + url + ') ' + suffix;
            };

            let body = '## Cleanup Review\\n\\n';
            body += '请**取消勾选**要移除的项目。默认全部保留。\\n\\n';

            if (archivedInactive.length > 0) {
              body += '### 归档且超过3年未更新\\n\\n';
              body += archivedInactive.map((i) => formatItem(i, 'archived')).join('\\n') + '\\n\\n';
            }
            if (archived.length > 0) {
              body += '### 已归档\\n\\n';
              body += archived.map((i) => formatItem(i, 'archived')).join('\\n') + '\\n\\n';
            }
            if (inactive.length > 0) {
              body += '### 超过3年未更新\\n\\n';
              body += inactive.map((i) => formatItem(i, 'inactive')).join('\\n') + '\\n\\n';
            }

            body += '完成后评论：\`@github-actions[bot] apply cleanup\`\\n';

            // Create issue via GitHub API
            const res = await fetch('https://api.github.com/repos/' + process.env.GITHUB_REPOSITORY + '/issues', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                title: '🧹 Cleanup Review - ' + new Date().toISOString().slice(0, 10),
                body: body,
                labels: ['cleanup'],
              }),
            });
            const data = await res.json();
            console.log('Issue created: ' + data.html_url);
          };

          main().catch(console.error);
          "
