name: Branch Cleanup

on:
  pull_request_target:
    types: [closed]

jobs:
  cleanup:
    if: github.event.pull_request.merged == true && github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Clean up merged branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "🧹 删除已合并分支: $BRANCH"
          gh api -X DELETE repos/${{ github.repository }}/git/refs/heads/$BRANCH || echo "分支已删除或不存在"
          echo "✅ 清理完成"