name: Apply Cleanup

on:
  issue_comment:
    types: [created]

jobs:
  apply-cleanup:
    if: >
      contains(github.event.comment.body, 'apply cleanup') &&
      (github.event.comment.author_association == 'OWNER' || github.event.comment.user.login == github.event.issue.user.login)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "*"
          cache: pnpm

      - run: pnpm install

      - name: Extract unchecked items from issue body
        id: extract-removals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          REMOVALS=$(echo "$ISSUE_BODY" | grep -E '^\- \[ \]' | grep -oE 'https?://[^)]+' || true)
          echo "removals=$(echo "$REMOVALS" | tr '\n' '|')" >> "$GITHUB_OUTPUT"
          if [ -z "$REMOVALS" ]; then
            echo "No items selected for removal. All projects will be kept."
            exit 0
          fi
          echo "Projects to remove:"
          echo "$REMOVALS"

      - name: Apply cleanup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REMOVALS: ${{ steps.extract-removals.outputs.removals }}
        run: |
          # Convert pipe-separated back to newline
          export REMOVALS=$(echo "$REMOVALS" | tr '|' '\n' | sed '/^$/d')
          node src/generators/apply-cleanup.js

      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet HEAD -- RAW_DATA/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            BRANCH_NAME="cleanup-$(date +%Y%m%d-%H%M%S)"
            ISSUE_NUMBER="${{ github.event.issue.number }}"

            git checkout -b "$BRANCH_NAME"
            git add RAW_DATA/
            git commit -m "cleanup: remove archived and inactive projects"
            git push -u origin "$BRANCH_NAME"

            # Create PR that links to and closes the issue
            gh pr create \
              --title "🧹 Apply cleanup for #$ISSUE_NUMBER" \
              --body "Auto-generated cleanup PR. Fixes #$ISSUE_NUMBER" \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "No changes to commit."
          fi
