name: CI Sync

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      AUTO_PR:
        description: '是否自动创建 PR'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  pull_request_target:
    types: [closed]

jobs:
  sync:
    if: github.event_name != 'pull_request_target' || (github.event.pull_request.merged == true && github.event.pull_request.user.login == 'github-actions[bot]')
    runs-on: ubuntu-latest

    steps:
      - name: Clean up merged branch
        if: github.event_name == 'pull_request_target'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "🧹 删除已合并分支: $BRANCH"
          gh api -X DELETE repos/${{ github.repository }}/git/refs/heads/$BRANCH || echo "分支已删除或不存在"
          exit 0

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '*'
          cache: pnpm

      - run: pnpm install

      - name: Check YAML syntax
        run: pnpm check:yaml

      - name: Check for existing open PR
        id: check-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --state open --author github-actions[bot] --base main --json id --jq length)
          echo "open_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "⚠️  已有 $COUNT 个未合并的 sync PR，跳过本次运行"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ 无未合并的 sync PR，继续"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync, commit and optionally PR
        if: steps.check-pr.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm sync

          AUTO_PR="${{ github.event.inputs.AUTO_PR || 'true' }}"

          # 检查是否有变更
          if ! git diff --quiet HEAD -- README.md RAW_DATA/ src/user.js; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            BRANCH_NAME="sync-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH_NAME"
            git add README.md RAW_DATA/ src/user.js
            git commit -m "sync: update readme and yaml"
            git push -u origin "$BRANCH_NAME"

            if [ "$AUTO_PR" = "false" ]; then
              echo "🔒 AUTO_PR=false，已推送分支 $BRANCH_NAME，未创建 PR"
              exit 0
            fi

            # 创建 PR
            gh pr create \
              --title "🔄 Sync: auto-update" \
              --body "Auto-generated by CI sync workflow." \
              --base main
          else
            echo "无变更，跳过 commit"
          fi
