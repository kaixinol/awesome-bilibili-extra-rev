name: CI Sync

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      
      - run: pnpm install
      
      - name: Check YAML syntax
        run: pnpm check:yaml

      - name: Check for existing open PR
        id: check-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --state open --author github-actions[bot] --base main --json id --jq length)
          echo "open_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "⚠️  已有 $COUNT 个未合并的 sync PR，跳过本次运行"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ 无未合并的 sync PR，继续"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync and generate PR
        if: steps.check-pr.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm sync

          # 检查是否有变更
          if ! git diff --quiet HEAD -- README.md RAW_DATA/ src/user.js; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            BRANCH_NAME="sync-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH_NAME"
            git add README.md RAW_DATA/ src/user.js
            git commit -m "sync: update readme and yaml"
            git push -u origin "$BRANCH_NAME"

            # 创建 PR
            gh pr create \
              --title "🔄 Sync: auto-update" \
              --body "Auto-generated by CI sync workflow." \
              --base main
          else
            echo "无变更，跳过 PR 创建"
          fi
